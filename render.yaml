services:
  - type: web
    name: legalizedreams
    runtime: python312
    buildCommand: bash backend/build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "/api"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "${RENDER_EXTERNAL_HOSTNAME},localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://${RENDER_EXTERNAL_HOSTNAME},http://localhost:5173"
      - key: JWT_ACCESS_TOKEN_LIFETIME
        value: "15"
      - key: JWT_REFRESH_TOKEN_LIFETIME
        value: "7"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "changeme123"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DATABASE_URL
        fromDatabase:
          name: legalizedreams-db
          property: connectionString

  - type: pserv
    name: legalizedreams-db
    runtime: postgres15
    plan: free
    ipAllowList: []
